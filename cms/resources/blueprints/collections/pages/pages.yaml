title: Page
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              required: true
              validate:
                - required
          - import: page_builder
  sidebar:
    display: Sidebar
    sections:
      - fields:
          - handle: slug
            field:
              type: slug
              localizable: true
              required: true
          - handle: seo_title
            field:
              type: text
              instructions: 'Overrides the page title in search results / browser tab.'
          - handle: seo_description
            field:
              type: textarea
