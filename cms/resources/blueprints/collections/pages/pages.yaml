title: Page
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              required: true
              validate:
                - required
          - handle: page_builder
            field:
              type: replicator
              display: 'Page Builder'
              instructions: 'Build the page from reusable blocks.'
              collapse: false
              sets:
                blocks:
                  display: Blocks
                  sets:
                    hero:
                      display: Hero
                      icon: hero
                      instructions: 'Full-width banner with heading and a button.'
                      fields:
                        - handle: heading
                          field:
                            type: text
                            required: true
                        - handle: subheading
                          field:
                            type: textarea
                        - handle: button_label
                          field:
                            type: text
                            width: 50
                        - handle: button_url
                          field:
                            type: text
                            width: 50
                    text:
                      display: Text
                      icon: text
                      instructions: 'Formatted rich text.'
                      fields:
                        - handle: body
                          field:
                            type: markdown
                    image:
                      display: Image
                      icon: assets
                      fields:
                        - handle: image
                          field:
                            type: assets
                            container: assets
                            max_files: 1
                            mode: grid
                        - handle: caption
                          field:
                            type: text
                    cta:
                      display: 'Call to Action'
                      icon: link
                      fields:
                        - handle: heading
                          field:
                            type: text
                        - handle: text
                          field:
                            type: textarea
                        - handle: button_label
                          field:
                            type: text
                            width: 50
                        - handle: button_url
                          field:
                            type: text
                            width: 50
                        - handle: style
                          field:
                            type: button_group
                            default: light
                            options:
                              light: Light
                              dark: Dark
                              brand: Brand
  sidebar:
    display: Sidebar
    sections:
      - fields:
          - handle: slug
            field:
              type: slug
              localizable: true
              required: true
          - handle: seo_title
            field:
              type: text
              instructions: 'Overrides the page title in search results / browser tab.'
          - handle: seo_description
            field:
              type: textarea
