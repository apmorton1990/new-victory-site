title: Resource
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Name
              required: true
              validate:
                - required
          - handle: resource_categories
            field:
              type: terms
              taxonomies:
                - resource_categories
              max_items: 1
              mode: select
              create: true
          - handle: description
            field:
              type: textarea
          - handle: phone
            field:
              type: text
              width: 50
          - handle: website
            field:
              type: text
              width: 50
          - handle: address
            field:
              type: text
