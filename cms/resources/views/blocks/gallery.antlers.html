<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-7xl px-6 py-16">
        {{ if heading }}<h2 class="mb-10 text-center text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
        {{ if images }}
            <div class="grid grid-cols-1 gap-4 {{ if columns == '2' }}sm:grid-cols-2{{ elseif columns == '4' }}sm:grid-cols-2 lg:grid-cols-4{{ else }}sm:grid-cols-2 lg:grid-cols-3{{ /if }}">
                {{ images }}
                    <img src="{{ url }}" alt="{{ alt }}" class="aspect-square w-full rounded-lg object-cover shadow-sm">
                {{ /images }}
            </div>
        {{ /if }}
    </div>
</section>
