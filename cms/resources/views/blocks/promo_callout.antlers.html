<section class="{{ if background == 'accent' }}bg-accent text-white{{ elseif background == 'light' }}bg-mist text-brand{{ elseif background == 'dark' }}bg-slate-900 text-white{{ else }}bg-brand text-white{{ /if }}">
    <div class="mx-auto flex max-w-5xl flex-col items-center gap-8 px-6 py-16 md:flex-row">
        {{ if image }}
            <div class="md:w-1/3">{{ image }}<img src="{{ url }}" alt="" class="w-full rounded-2xl object-cover">{{ /image }}</div>
        {{ /if }}
        <div class="flex-1 text-center md:text-left">
            <h2 class="text-3xl font-extrabold tracking-tight sm:text-4xl">{{ heading }}</h2>
            {{ if subheading }}<p class="mt-2 text-lg opacity-90">{{ subheading }}</p>{{ /if }}
            {{ if details }}
                <dl class="mt-4 space-y-1 text-sm">
                    {{ details }}
                        <div class="flex justify-center gap-2 md:justify-start">
                            <dt class="font-semibold">{{ label }}{{ if label }}:{{ /if }}</dt>
                            <dd class="opacity-90">{{ value }}</dd>
                        </div>
                    {{ /details }}
                </dl>
            {{ /if }}
            {{ if button_label && button_url }}
                <a href="{{ button_url }}" class="mt-6 inline-block rounded-full px-7 py-3 text-sm font-semibold transition {{ if background == 'light' }}bg-accent text-white hover:bg-accent-hover{{ else }}bg-white text-brand hover:bg-slate-200{{ /if }}">{{ button_label }}</a>
            {{ /if }}
        </div>
    </div>
</section>
