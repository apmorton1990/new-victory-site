<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-4xl px-6 py-16">
        {{ if heading }}<h2 class="text-center text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
        {{ if intro }}<p class="mt-3 text-center {{ if background == 'brand' }}text-slate-200{{ else }}text-slate-600{{ /if }}">{{ intro }}</p>{{ /if }}
        <dl class="mt-8 divide-y rounded-xl border {{ if background == 'brand' }}divide-white/15 border-white/15{{ else }}divide-slate-200 border-slate-200{{ /if }}">
            {{ items }}
                <div class="flex flex-col gap-1 px-6 py-4 sm:flex-row sm:gap-6">
                    <dt class="font-semibold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }} sm:w-1/3">{{ label }}</dt>
                    <dd class="{{ if background == 'brand' }}text-slate-200{{ else }}text-slate-600{{ /if }} sm:flex-1">{{ description }}</dd>
                </div>
            {{ /items }}
        </dl>
    </div>
</section>
