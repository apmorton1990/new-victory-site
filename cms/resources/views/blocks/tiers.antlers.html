<section class="mx-auto max-w-4xl px-6 py-16">
    {{ if heading }}<h2 class="text-center text-3xl font-bold text-brand">{{ heading }}</h2>{{ /if }}
    {{ if intro }}<p class="mt-3 text-center text-slate-600">{{ intro }}</p>{{ /if }}
    <dl class="mt-8 divide-y divide-slate-200 rounded-xl border border-slate-200">
        {{ items }}
            <div class="flex flex-col gap-1 px-6 py-4 sm:flex-row sm:gap-6">
                <dt class="font-semibold text-brand sm:w-1/3">{{ label }}</dt>
                <dd class="text-slate-600 sm:flex-1">{{ description }}</dd>
            </div>
        {{ /items }}
    </dl>
</section>
