<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-3xl px-6 py-16">
        {{ if heading }}<h2 class="text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
        {{ if intro }}<p class="mt-3 {{ if background == 'brand' }}text-slate-200{{ else }}text-slate-600{{ /if }}">{{ intro }}</p>{{ /if }}
        <ul class="mt-6 space-y-3">
            {{ items }}
                <li class="flex items-start gap-3">
                    <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-accent text-xs font-bold text-white">&check;</span>
                    <span class="text-lg {{ if background == 'brand' }}text-slate-100{{ else }}text-slate-700{{ /if }}">{{ text }}</span>
                </li>
            {{ /items }}
        </ul>
    </div>
</section>
