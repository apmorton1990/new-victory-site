<section class="mx-auto max-w-3xl px-6 py-16">
    {{ if heading }}<h2 class="text-3xl font-bold text-brand">{{ heading }}</h2>{{ /if }}
    {{ if intro }}<p class="mt-3 text-slate-600">{{ intro }}</p>{{ /if }}
    <ul class="mt-6 space-y-3">
        {{ items }}
            <li class="flex items-start gap-3">
                <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-accent text-xs font-bold text-white">&check;</span>
                <span class="text-lg text-slate-700">{{ text }}</span>
            </li>
        {{ /items }}
    </ul>
</section>
