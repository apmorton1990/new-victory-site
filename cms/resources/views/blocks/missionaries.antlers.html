<section class="mx-auto max-w-7xl px-6 py-16">
    {{ if heading }}<h2 class="mb-10 text-center text-3xl font-bold text-brand">{{ heading }}</h2>{{ /if }}
    <div class="grid grid-cols-1 gap-8 {{ if columns == '3' }}sm:grid-cols-2 lg:grid-cols-3{{ elseif columns == '4' }}sm:grid-cols-2 lg:grid-cols-4{{ else }}sm:grid-cols-2{{ /if }}">
        {{ collection:missionaries }}
            <div class="flex flex-col items-center rounded-xl border border-slate-200 bg-white p-6 text-center shadow-sm">
                {{ if photo }}
                    {{ photo }}<img src="{{ url }}" alt="" class="mb-4 h-28 w-28 rounded-full object-cover">{{ /photo }}
                {{ else }}
                    <div class="mb-4 h-28 w-28 rounded-full bg-mist"></div>
                {{ /if }}
                <h3 class="text-lg font-semibold text-brand">{{ title }}</h3>
                {{ if region }}<p class="text-sm font-medium text-accent">{{ region }}</p>{{ /if }}
                {{ if bio }}<p class="mt-2 text-sm text-slate-600">{{ bio }}</p>{{ /if }}
                {{ if link }}<a href="{{ link }}" class="mt-3 text-sm font-semibold text-accent hover:text-accent-hover">Learn more &rarr;</a>{{ /if }}
            </div>
        {{ /collection:missionaries }}
    </div>
</section>
