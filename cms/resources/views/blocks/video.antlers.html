{{ if video_url }}
<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-4xl px-6 py-16">
        {{ if heading }}<h2 class="mb-8 text-center text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
        <div class="relative aspect-video overflow-hidden rounded-2xl bg-brand shadow-md">
            <iframe
                src="{{ video_url | replace:'watch?v=':'embed/' | replace:'youtu.be/':'www.youtube.com/embed/' }}"
                class="absolute inset-0 h-full w-full"
                title="{{ heading ?? 'Video' }}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
            ></iframe>
        </div>
        {{ if caption }}<p class="mt-3 text-center text-sm {{ if background == 'brand' }}text-slate-300{{ else }}text-slate-500{{ /if }}">{{ caption }}</p>{{ /if }}
    </div>
</section>
{{ /if }}
