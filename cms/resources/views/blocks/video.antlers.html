{{ if video_url }}
<section class="mx-auto max-w-4xl px-6 py-16">
    {{ if heading }}<h2 class="mb-8 text-center text-3xl font-bold text-brand">{{ heading }}</h2>{{ /if }}
    <div class="relative aspect-video overflow-hidden rounded-xl bg-brand shadow">
        <iframe
            src="{{ video_url | replace:'watch?v=':'embed/' | replace:'youtu.be/':'www.youtube.com/embed/' }}"
            class="absolute inset-0 h-full w-full"
            title="{{ heading ?? 'Video' }}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
        ></iframe>
    </div>
    {{ if caption }}<p class="mt-3 text-center text-sm text-slate-500">{{ caption }}</p>{{ /if }}
</section>
{{ /if }}
