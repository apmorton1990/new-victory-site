<section class="bg-brand text-white">
    <div class="mx-auto flex max-w-5xl flex-col items-center gap-6 px-6 py-32 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight sm:text-6xl">{{ heading }}</h1>
        {{ if subheading }}<p class="max-w-2xl text-lg text-slate-200">{{ subheading }}</p>{{ /if }}
        {{ if button_label && button_url }}
            <a href="{{ button_url }}" class="mt-2 inline-block rounded-full bg-accent px-7 py-3 text-sm font-semibold text-white transition hover:bg-accent-hover">{{ button_label }}</a>
        {{ /if }}
    </div>
</section>
