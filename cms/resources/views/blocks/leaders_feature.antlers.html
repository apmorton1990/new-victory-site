<section class="bg-mist">
    <div class="mx-auto flex max-w-5xl flex-col items-center gap-8 px-6 py-20 md:flex-row">
        {{ if image }}
            <div class="md:w-1/3">{{ image }}<img src="{{ url }}" alt="" class="w-full rounded-2xl object-cover">{{ /image }}</div>
        {{ /if }}
        <div class="md:flex-1">
            {{ if heading }}<p class="text-sm font-semibold uppercase tracking-wide text-accent">{{ heading }}</p>{{ /if }}
            {{ if names }}<h2 class="mt-1 text-3xl font-bold text-brand">{{ names }}</h2>{{ /if }}
            {{ if bio }}<p class="mt-4 text-lg text-slate-600">{{ bio | nl2br }}</p>{{ /if }}
            {{ if button_label && button_url }}
                <a href="{{ button_url }}" class="mt-6 inline-block rounded-full bg-accent px-7 py-3 text-sm font-semibold text-white transition hover:bg-accent-hover">{{ button_label }}</a>
            {{ /if }}
        </div>
    </div>
</section>
