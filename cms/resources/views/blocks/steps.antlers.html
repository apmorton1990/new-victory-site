<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-4xl px-6 py-16">
        {{ if heading }}<h2 class="text-center text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
        {{ if intro }}<p class="mt-3 text-center {{ if background == 'brand' }}text-slate-200{{ else }}text-slate-600{{ /if }}">{{ intro }}</p>{{ /if }}
        <ol class="mt-10 space-y-8">
            {{ items }}
                <li class="flex gap-5">
                    <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-accent text-lg font-bold text-white">{{ index }}</span>
                    <div>
                        <h3 class="text-xl font-semibold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ title }}</h3>
                        {{ if description }}<p class="mt-1 {{ if background == 'brand' }}text-slate-200{{ else }}text-slate-600{{ /if }}">{{ description | nl2br }}</p>{{ /if }}
                    </div>
                </li>
            {{ /items }}
        </ol>
    </div>
</section>
