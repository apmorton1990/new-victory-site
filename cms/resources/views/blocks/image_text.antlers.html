<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    <div class="mx-auto max-w-6xl px-6 py-16">
        <div class="grid items-center gap-10 md:grid-cols-2">
            <div class="{{ if image_position == 'right' }}md:order-2{{ else }}md:order-1{{ /if }}">
                {{ if image }}{{ image }}<img src="{{ url }}" alt="" class="w-full rounded-2xl object-cover shadow-md">{{ /image }}{{ /if }}
            </div>
            <div class="{{ if image_position == 'right' }}md:order-1{{ else }}md:order-2{{ /if }}">
                {{ if heading }}<h2 class="text-3xl font-bold {{ if background == 'brand' }}text-white{{ else }}text-brand{{ /if }}">{{ heading }}</h2>{{ /if }}
                <div class="prose mt-4 max-w-none prose-a:text-accent {{ if background == 'brand' }}prose-invert{{ else }}prose-slate prose-headings:text-brand{{ /if }}">{{ body }}</div>
                {{ if button_label && button_url }}
                    <a href="{{ button_url }}" class="mt-6 inline-block rounded-full bg-accent px-7 py-3 text-sm font-semibold text-white transition hover:bg-accent-hover">{{ button_label }}</a>
                {{ /if }}
            </div>
        </div>
    </div>
</section>
