{{ if image }}
    <figure class="mx-auto max-w-4xl px-6 py-10">
        {{ image }}
            <img src="{{ url }}" alt="{{ caption }}" class="w-full rounded-xl">
        {{ /image }}
        {{ if caption }}<figcaption class="mt-3 text-center text-sm text-slate-500">{{ caption }}</figcaption>{{ /if }}
    </figure>
{{ /if }}
