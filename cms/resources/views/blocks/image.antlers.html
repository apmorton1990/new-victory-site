<section class="{{ if background == 'mist' }}bg-mist{{ elseif background == 'brand' }}bg-brand{{ /if }}">
    {{ if image }}
        <figure class="mx-auto max-w-4xl px-6 py-10">
            {{ image }}
                <img src="{{ url }}" alt="{{ caption }}" class="w-full rounded-2xl shadow-md">
            {{ /image }}
            {{ if caption }}<figcaption class="mt-3 text-center text-sm {{ if background == 'brand' }}text-slate-300{{ else }}text-slate-500{{ /if }}">{{ caption }}</figcaption>{{ /if }}
        </figure>
    {{ /if }}
</section>
