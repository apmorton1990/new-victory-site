title: 'Page Builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      display: 'Page Builder'
      instructions: 'Build the page from reusable blocks.'
      collapse: false
      sets:
        blocks:
          display: Blocks
          sets:
            hero:
              display: Hero
              icon: hero
              instructions: 'Full-width banner with heading and a button.'
              fields:
                - handle: heading
                  field: { type: text, required: true }
                - handle: subheading
                  field: { type: textarea }
                - handle: button_label
                  field: { type: text, width: 50 }
                - handle: button_url
                  field: { type: text, width: 50 }
                - handle: alignment
                  field:
                    type: button_group
                    display: 'Text alignment'
                    default: center
                    width: 33
                    options: { left: Left, center: Center, right: Right }
                - handle: text_size
                  field:
                    type: button_group
                    display: 'Text size'
                    default: large
                    width: 33
                    options: { small: S, medium: M, large: L, xlarge: XL }
                - handle: text_color
                  field:
                    type: button_group
                    display: 'Text color'
                    default: white
                    width: 33
                    options: { white: White, brand: Navy, dark: Dark, accent: Blue }
                - handle: background
                  field:
                    type: button_group
                    display: 'Background color'
                    default: brand
                    width: 50
                    options: { brand: Navy, light: Light, mist: Mist, accent: Blue }
                - handle: background_type
                  field:
                    type: button_group
                    display: 'Background type'
                    default: color
                    width: 50
                    options: { color: Color, image: Image }
                - handle: background_image
                  field:
                    type: assets
                    container: assets
                    max_files: 1
                    mode: grid
                    if: { background_type: 'equals image' }
                - handle: overlay
                  field:
                    type: button_group
                    display: 'Image overlay'
                    default: gradient_left
                    options: { none: None, dark: Dark, darker: Darker, gradient_left: 'Gradient (left)', gradient_bottom: 'Gradient (bottom)', brand: Brand }
                    if: { background_type: 'equals image' }
                - handle: height
                  field:
                    type: button_group
                    display: Height
                    default: auto
                    width: 50
                    options: { auto: Auto, medium: Medium, large: Large, full: 'Full screen' }
                - handle: content_width
                  field:
                    type: button_group
                    display: 'Content width'
                    default: wide
                    width: 50
                    options: { narrow: Narrow, half: Half, wide: Wide }
                - handle: eyebrow
                  field:
                    type: text
                    display: Eyebrow
                    instructions: 'Small label shown above the heading.'
                - handle: heading_color
                  field:
                    type: button_group
                    display: 'Heading color'
                    default: inherit
                    options: { inherit: Auto, white: White, navy: Navy, blue: Blue, gold: Gold, custom: Custom }
                - handle: heading_color_custom
                  field:
                    type: color
                    display: 'Custom heading color'
                    if: { heading_color: 'equals custom' }
                - handle: heading_uppercase
                  field:
                    type: toggle
                    display: 'Uppercase heading'
                    default: false
                - handle: secondary_button_label
                  field: { type: text, display: 'Secondary button label', width: 50 }
                - handle: secondary_button_url
                  field: { type: text, display: 'Secondary button URL', width: 50 }
            text:
              display: Text
              icon: text
              instructions: 'Formatted rich text.'
              fields:
                - handle: body
                  field: { type: markdown }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            image:
              display: Image
              icon: assets
              fields:
                - handle: image
                  field: { type: assets, container: assets, max_files: 1, mode: grid }
                - handle: caption
                  field: { type: text }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            cta:
              display: 'Call to Action'
              icon: link
              fields:
                - handle: heading
                  field: { type: text }
                - handle: text
                  field: { type: textarea }
                - handle: button_label
                  field: { type: text, width: 50 }
                - handle: button_url
                  field: { type: text, width: 50 }
                - handle: style
                  field:
                    type: button_group
                    default: light
                    options: { light: Light, dark: Dark, brand: Brand }
            feature_cards:
              display: 'Feature Cards'
              icon: addset
              instructions: 'Grid of linked image cards (e.g. ministry areas).'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: columns
                  field:
                    type: button_group
                    default: '3'
                    width: 50
                    options: { '2': 2, '3': 3, '4': 4 }
                - handle: cards
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: image
                        field: { type: assets, container: assets, max_files: 1, mode: grid }
                      - handle: title
                        field: { type: text, width: 50 }
                      - handle: url
                        field: { type: text, width: 50 }
                      - handle: text
                        field: { type: markdown, instructions: 'Optional description (supports lists).' }
                      - handle: button_label
                        field: { type: text, instructions: 'Optional link text, e.g. "Learn More".' }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            image_text:
              display: 'Image + Text'
              icon: 'assets-image'
              instructions: 'Image beside a column of text with an optional button.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: body
                  field: { type: markdown }
                - handle: image
                  field: { type: assets, container: assets, max_files: 1, mode: grid }
                - handle: image_position
                  field:
                    type: button_group
                    default: left
                    width: 50
                    options: { left: Left, right: Right }
                - handle: button_label
                  field: { type: text, width: 50 }
                - handle: button_url
                  field: { type: text, width: 50 }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            accordion:
              display: 'Accordion / FAQ'
              icon: 'list-ul'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: items
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: question
                        field: { type: text }
                      - handle: answer
                        field: { type: textarea }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            feature_list:
              display: 'Feature List'
              icon: 'list-ul'
              instructions: 'Bulleted list of points or benefits.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: intro
                  field: { type: textarea }
                - handle: items
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: text
                        field: { type: text }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            leaders_feature:
              display: 'Leaders Feature'
              icon: user
              instructions: 'Highlight a leader or couple with photo and bio.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: image
                  field: { type: assets, container: assets, max_files: 1, mode: grid }
                - handle: names
                  field: { type: text }
                - handle: bio
                  field: { type: textarea }
                - handle: button_label
                  field: { type: text, width: 50 }
                - handle: button_url
                  field: { type: text, width: 50 }
            video:
              display: Video
              icon: 'video'
              instructions: 'Embed a YouTube or Vimeo video.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: video_url
                  field: { type: text, instructions: 'Paste a YouTube or Vimeo link.' }
                - handle: caption
                  field: { type: text }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            button_group:
              display: 'Button Group'
              icon: link
              fields:
                - handle: heading
                  field: { type: text }
                - handle: buttons
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: label
                        field: { type: text, width: 50 }
                      - handle: url
                        field: { type: text, width: 50 }
                      - handle: style
                        field:
                          type: button_group
                          default: primary
                          options: { primary: Primary, secondary: Secondary }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            embed:
              display: 'Embed / HTML'
              icon: code
              instructions: 'Paste an embed snippet (Church Center, Mailchimp, maps, forms).'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: code
                  field: { type: code, mode: htmlmixed }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            steps:
              display: Steps
              icon: 'list-ol'
              instructions: 'Numbered step-by-step / next steps.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: intro
                  field: { type: textarea }
                - handle: items
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: title
                        field: { type: text }
                      - handle: description
                        field: { type: textarea }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            tiers:
              display: Tiers
              icon: 'list-ul'
              instructions: 'Label + description rows (e.g. age groups).'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: intro
                  field: { type: textarea }
                - handle: items
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: label
                        field: { type: text }
                      - handle: description
                        field: { type: textarea }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            gallery:
              display: Gallery
              icon: 'assets-image'
              instructions: 'Grid of images.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: columns
                  field:
                    type: button_group
                    default: '3'
                    width: 50
                    options: { '2': 2, '3': 3, '4': 4 }
                - handle: images
                  field: { type: assets, container: assets, mode: grid }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            quote:
              display: Quote
              icon: 'quote'
              instructions: 'Pull quote, testimonial or scripture.'
              fields:
                - handle: quote
                  field: { type: textarea }
                - handle: attribution
                  field: { type: text, width: 50 }
                - handle: role
                  field: { type: text, width: 50 }
            location_map:
              display: 'Location / Map'
              icon: 'map'
              instructions: 'Address + directions (from Service Info) with an optional embedded map.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: embed_code
                  field: { type: code, mode: htmlmixed, instructions: 'Optional: paste a Google Maps embed iframe.' }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            service_times:
              display: 'Service Times'
              icon: calendar
              instructions: 'Service times pulled from the Service Info global.'
              fields:
                - handle: heading
                  field: { type: text }
            team_grid:
              display: 'Team Grid'
              icon: users
              instructions: 'Grid of people from the Staff collection.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: columns
                  field:
                    type: button_group
                    default: '3'
                    width: 50
                    options: { '2': 2, '3': 3, '4': 4 }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            promo_callout:
              display: 'Promo / Announcement'
              icon: star
              instructions: 'Dated promo (camps, events) with detail lines and a button.'
              fields:
                - handle: heading
                  field: { type: text, required: true }
                - handle: subheading
                  field: { type: textarea }
                - handle: details
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: label
                        field: { type: text, width: 50 }
                      - handle: value
                        field: { type: text, width: 50 }
                - handle: image
                  field: { type: assets, container: assets, max_files: 1, mode: grid }
                - handle: button_label
                  field: { type: text, width: 50 }
                - handle: button_url
                  field: { type: text, width: 50 }
                - handle: background
                  field:
                    type: button_group
                    default: brand
                    options: { brand: Navy, accent: Blue, light: Light, dark: Dark }
            resource_directory:
              display: 'Resource Directory'
              icon: 'list-ul'
              instructions: 'Lists the Resources collection grouped by category (accordion).'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
            missionaries:
              display: Missionaries
              icon: globe
              instructions: 'Grid from the Missionaries collection.'
              fields:
                - handle: heading
                  field: { type: text }
                - handle: columns
                  field:
                    type: button_group
                    default: '2'
                    width: 50
                    options: { '2': 2, '3': 3, '4': 4 }
                - handle: background
                  field:
                    type: button_group
                    display: 'Section background'
                    default: default
                    width: 50
                    options: { default: Default, mist: Light, brand: Navy }
